scenarios:
  - schema_version: "0.1"
    name: registry-generic-basic
    description: Portable system+user chat for registry catalog
    model:
      id: Qwen/Qwen2.5-0.5B-Instruct
      revision: main
      trust_remote_code: false
    messages:
      - role: system
        content: You are a careful assistant.
      - role: user
        content: Reply with exactly one short sentence.
    parameters:
      temperature: 0
      max_tokens: 24
      seed: 42
    generation:
      add_generation_prompt: true
    observe: [artifact, template, special_tokens, tokens, generation]
    parity_policy: strict
    backends: [transformers, vllm, llamacpp]
