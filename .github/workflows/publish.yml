name: publish

# Automatic PyPI publish when a v* tag is pushed.
# Manual: Actions → publish → Run workflow (use after adding the secret).
#
# Required secret (repo → Settings → Secrets and variables → Actions):
#   PYPI_API_TOKEN  =  pypi-...  (PyPI account → API tokens, scope: entire account or project:eleanity)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Build sdist + wheel
        run: uv build

      - name: Verify dist
        run: |
          ls -la dist/
          python - <<'PY'
          from pathlib import Path
          wheels = list(Path("dist").glob("*.whl"))
          sdists = list(Path("dist").glob("*.tar.gz"))
          assert wheels and sdists, "expected wheel + sdist"
          print("ok:", [p.name for p in wheels + sdists])
          PY

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${UV_PUBLISH_TOKEN:-}" ]; then
            echo "::error::Missing repository secret PYPI_API_TOKEN."
            echo "Create a token at https://pypi.org/manage/account/token/"
            echo "Then: gh secret set PYPI_API_TOKEN -R TheusHen/eleanity"
            echo "Or: GitHub → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          uv publish --token "$UV_PUBLISH_TOKEN"
