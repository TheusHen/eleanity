name: publish

# Publishes to PyPI when a v* tag is pushed and PYPI_API_TOKEN is configured.
# Until the first successful publish, install from git (see README).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --group dev
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish (Trusted Publishing or token)
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "${UV_PUBLISH_TOKEN:-}" ]; then
            uv publish --token "$UV_PUBLISH_TOKEN"
          else
            echo "PYPI_API_TOKEN not set."
            echo "Configure Trusted Publishing for eleanity on PyPI, or add PYPI_API_TOKEN."
            echo "Built artifacts remain available as the dist artifact."
            ls -la dist/
            exit 0
          fi
