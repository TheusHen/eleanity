name: publish

# Build on every v* tag / manual dispatch.
# Publish to PyPI via Trusted Publishing (OIDC) when the `pypi` environment
# is linked on https://pypi.org/manage/project/eleanity/settings/publishing/
# Optional fallback: repository secret PYPI_API_TOKEN.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --group dev
      - run: uv build
      - name: Verify dist
        run: |
          ls -la dist/
          python - <<'PY'
          from pathlib import Path
          wheels = list(Path("dist").glob("*.whl"))
          sdists = list(Path("dist").glob("*.tar.gz"))
          assert wheels and sdists, "expected wheel + sdist"
          print("ok:", [p.name for p in wheels + sdists])
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/eleanity
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish with token (if secret present)
        id: token_publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "${UV_PUBLISH_TOKEN:-}" ]; then
            uv publish --token "$UV_PUBLISH_TOKEN"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No PYPI_API_TOKEN; will try Trusted Publishing (OIDC)."
          fi
      - name: Publish with Trusted Publishing (OIDC)
        if: steps.token_publish.outputs.published != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          packages-dir: dist/
          skip-existing: true
      - name: Note if publish skipped
        if: steps.token_publish.outputs.published != 'true'
        run: |
          echo "If OIDC publish failed, register Trusted Publisher on PyPI:"
          echo "  Owner: TheusHen"
          echo "  Repository: eleanity"
          echo "  Workflow: publish.yml"
          echo "  Environment: pypi"
          echo "Artifacts remain attached to this run."
          ls -la dist/
