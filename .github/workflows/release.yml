name: release

# Every non-release commit merged into main gets a new patch version. The
# workflow writes that version back to the repository, publishes the matching
# wheel/sdist to PyPI, then creates an immutable Git tag and GitHub prerelease.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  # Version allocation must be serial: two workflows must never choose the
  # same next patch number.
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Always process the current main tip. Queued runs from older pushes
          # then observe the release marker below and exit without allocating
          # a duplicate version.
          ref: main
          # A fine-grained PAT is optional, but needed when protected-branch
          # rules do not allow GITHUB_TOKEN to push the version commit.
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Ignore an already-versioned main tip
        id: source
        run: |
          set -euo pipefail
          subject="$(git log -1 --format=%s)"
          echo "main tip: $subject"
          if [[ "$subject" == *"[skip auto-release]"* ]]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "main is already the release commit; nothing to publish"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@v7
        if: steps.source.outputs.release == 'true'
        with:
          enable-cache: true

      - name: Install Python
        if: steps.source.outputs.release == 'true'
        run: uv python install 3.11

      - name: Allocate the next patch version
        if: steps.source.outputs.release == 'true'
        id: version
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          match = re.search(r'(?m)^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"\s*$', text)
          if not match:
              raise SystemExit("Automatic releases require a stable X.Y.Z version in pyproject.toml")
          major, minor, patch = (int(value) for value in match.groups())
          version = f"{major}.{minor}.{patch + 1}"
          pyproject.write_text(
              text[: match.start()] + f'version = "{version}"' + text[match.end() :],
              encoding="utf-8",
          )

          version_file = Path("src/eleanity/version.py")
          source = version_file.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'(?m)^__version__\s*=\s*"[^"]+"\s*$',
              f'__version__ = "{version}"',
              source,
          )
          if count != 1:
              raise SystemExit("Expected exactly one __version__ assignment in src/eleanity/version.py")
          version_file.write_text(updated, encoding="utf-8")

          Path(".release-version").write_text(version + "\n", encoding="utf-8")
          PY
          echo "version=$(cat .release-version)" >> "$GITHUB_OUTPUT"
          echo "tag=v$(cat .release-version)" >> "$GITHUB_OUTPUT"

      - name: Verify and build the release candidate
        if: steps.source.outputs.release == 'true'
        run: |
          set -euo pipefail
          uv sync --group dev
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run pytest -q
          uv build

      - name: Verify package metadata
        if: steps.source.outputs.release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          import zipfile
          from pathlib import Path
          import os

          expected = os.environ["VERSION"]
          wheels = list(Path("dist").glob("*.whl"))
          sdists = list(Path("dist").glob("*.tar.gz"))
          assert len(wheels) == 1 and len(sdists) == 1, "expected exactly one wheel and one sdist"
          assert wheels[0].name.startswith(f"eleanity-{expected}-"), wheels[0].name
          assert sdists[0].name.startswith(f"eleanity-{expected}"), sdists[0].name
          with zipfile.ZipFile(wheels[0]) as wheel:
              metadata = next(name for name in wheel.namelist() if name.endswith("METADATA"))
              text = wheel.read(metadata).decode("utf-8")
          actual = re.search(r"(?m)^Version:\s*(.+)$", text)
          assert actual and actual.group(1).strip() == expected, actual
          print(f"Verified wheel and sdist metadata for {expected}")
          PY
          cd dist
          sha256sum * > SHA256SUMS

      - name: Commit the release version
        if: steps.source.outputs.release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/eleanity/version.py
          git commit -m "chore(release): v${VERSION} [skip auto-release]"
          git push origin HEAD:main

      - name: Create immutable tag
        if: steps.source.outputs.release == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Refusing to overwrite existing tag $TAG"
            exit 1
          fi
          git tag -a "$TAG" -m "Eleanity $TAG"
          git push origin "$TAG"

      - name: Publish to PyPI
        if: steps.source.outputs.release == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${UV_PUBLISH_TOKEN:-}" ]; then
            echo "::error::Missing repository secret PYPI_API_TOKEN."
            exit 1
          fi
          uv publish --token "$UV_PUBLISH_TOKEN"

      - name: Create GitHub prerelease
        if: steps.source.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$TAG" dist/* \
            --title "v${VERSION}" \
            --prerelease \
            --generate-notes
