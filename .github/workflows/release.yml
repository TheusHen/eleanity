name: release

# A normal main commit opens an automated version-bump PR. That PR must satisfy
# branch protection; once merged, this workflow publishes its exact commit.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare-release-pr:
    if: ${{ !contains(github.event.head_commit.message, '[skip auto-release]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Require the release automation token
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "::error::RELEASE_PAT is required to create a release PR that can run required checks."
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
          # A PAT (or GitHub App token) is required here: events created by
          # GITHUB_TOKEN do not start the required PR-check workflows.
          token: ${{ secrets.RELEASE_PAT }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Allocate the next patch version
        id: version
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          match = re.search(r'(?m)^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"\s*$', text)
          if not match:
              raise SystemExit("Automatic releases require a stable X.Y.Z version in pyproject.toml")
          major, minor, patch = (int(value) for value in match.groups())
          version = f"{major}.{minor}.{patch + 1}"
          pyproject.write_text(
              text[: match.start()] + f'version = "{version}"' + text[match.end() :],
              encoding="utf-8",
          )

          version_file = Path("src/eleanity/version.py")
          source = version_file.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'(?m)^__version__[ \t]*=[ \t]*"[^"]+"[ \t]*$',
              f'__version__ = "{version}"',
              source,
          )
          if count != 1:
              raise SystemExit("Expected exactly one __version__ assignment in src/eleanity/version.py")
          version_file.write_text(updated, encoding="utf-8")
          Path(".release-version").write_text(version + "\n", encoding="utf-8")
          PY
          echo "version=$(cat .release-version)" >> "$GITHUB_OUTPUT"

      - name: Create and auto-merge the release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          branch="release/v${VERSION}"
          existing="$(gh pr list --head "$branch" --state open --json url --jq '.[0].url // empty')"
          if [ -n "$existing" ]; then
            echo "Release PR already open: $existing"
            exit 0
          fi
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "::error::Release branch $branch already exists without an open PR. Resolve it before retrying."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add pyproject.toml src/eleanity/version.py
          git commit -m "chore(release): v${VERSION} [skip auto-release]"
          git push origin "HEAD:refs/heads/$branch"
          pr_url="$(gh pr create --base main --head "$branch" --title "chore(release): v${VERSION} [skip auto-release]" --body "Automated patch release. Required checks must pass before merge.")"
          gh pr merge "$pr_url" --auto --squash

  publish-release:
    if: ${{ contains(github.event.head_commit.message, '[skip auto-release]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Resolve version and require an unpublished tag
        id: version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' pyproject.toml)"
          test -n "$version"
          tag="v${version}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Refusing to overwrite existing tag $tag"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify and build the release
        run: |
          set -euo pipefail
          uv sync --group dev
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run pytest -q
          uv build
          cd dist
          sha256sum * > SHA256SUMS

      - name: Verify package metadata
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          import zipfile
          from pathlib import Path

          expected = os.environ["VERSION"]
          wheels = list(Path("dist").glob("*.whl"))
          sdists = list(Path("dist").glob("*.tar.gz"))
          assert len(wheels) == 1 and len(sdists) == 1, "expected exactly one wheel and one sdist"
          assert wheels[0].name.startswith(f"eleanity-{expected}-"), wheels[0].name
          assert sdists[0].name.startswith(f"eleanity-{expected}"), sdists[0].name
          with zipfile.ZipFile(wheels[0]) as wheel:
              metadata = next(name for name in wheel.namelist() if name.endswith("METADATA"))
              actual = re.search(r"(?m)^Version:\s*(.+)$", wheel.read(metadata).decode("utf-8"))
          assert actual and actual.group(1).strip() == expected, actual
          PY

      - name: Create immutable tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Eleanity $TAG"
          git push origin "$TAG"

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${UV_PUBLISH_TOKEN:-}" ]; then
            echo "::error::Missing repository secret PYPI_API_TOKEN."
            exit 1
          fi
          uv publish --token "$UV_PUBLISH_TOKEN"

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" dist/* --title "v${VERSION}" --prerelease --generate-notes
