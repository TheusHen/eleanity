name: release

# A release is created when main contains a version that has not been
# published yet. Version changes are reviewed like normal source changes.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version and release state
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' pyproject.toml)"
          source_version="$(sed -n 's/^__version__ = "\([^"]*\)"$/\1/p' src/eleanity/version.py)"
          test -n "$version"
          if [ "$version" != "$source_version" ]; then
            echo "::error::pyproject version ($version) differs from package version ($source_version)"
            exit 1
          fi
          tag="v${version}"
          complete=false
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null && gh release view "$tag" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$tag")"
            if [ "$tag_sha" != "$GITHUB_SHA" ]; then
              echo "::error::$tag already belongs to $tag_sha, not $GITHUB_SHA"
              exit 1
            fi
            complete=true
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "complete=$complete" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@v7
        if: steps.release.outputs.complete != 'true'
        with:
          enable-cache: true

      - name: Install Python
        if: steps.release.outputs.complete != 'true'
        run: uv python install 3.11

      - name: Verify and build
        if: steps.release.outputs.complete != 'true'
        run: |
          set -euo pipefail
          uv sync --group dev
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run mypy src/eleanity
          uv run pytest -q
          uv build
          cd dist
          sha256sum * > SHA256SUMS

      - name: Verify package metadata
        if: steps.release.outputs.complete != 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import zipfile
          from pathlib import Path

          expected = os.environ["VERSION"]
          wheels = list(Path("dist").glob("*.whl"))
          sdists = list(Path("dist").glob("*.tar.gz"))
          assert len(wheels) == 1 and len(sdists) == 1
          assert wheels[0].name.startswith(f"eleanity-{expected}-")
          assert sdists[0].name.startswith(f"eleanity-{expected}")
          with zipfile.ZipFile(wheels[0]) as wheel:
              metadata = next(name for name in wheel.namelist() if name.endswith("METADATA"))
              match = re.search(r"(?m)^Version:\s*(.+)$", wheel.read(metadata).decode("utf-8"))
          assert match and match.group(1).strip() == expected
          PY

      - name: Publish to PyPI
        if: steps.release.outputs.complete != 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${UV_PUBLISH_TOKEN:-}" ]; then
            echo "::error::Missing repository secret PYPI_API_TOKEN."
            exit 1
          fi
          set +e
          output="$(uv publish --token "$UV_PUBLISH_TOKEN" 2>&1)"
          code=$?
          set -e
          echo "$output"
          if [ "$code" -ne 0 ] && ! echo "$output" | grep -qiE 'already exists|File already exists|403.*already'; then
            exit "$code"
          fi

      - name: Create immutable tag
        if: steps.release.outputs.complete != 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            test "$(git rev-list -n 1 "$TAG")" = "$GITHUB_SHA"
          else
            git tag -a "$TAG" -m "Eleanity $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub release
        if: steps.release.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "v${VERSION}" --generate-notes --verify-tag
          fi
